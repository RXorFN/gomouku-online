<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线五子棋</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 登录/注册页面 -->
    <div id="auth-page" class="page">
      <div class="auth-container">
        <h1>在线五子棋</h1>
        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login">登录</button>
          <button class="tab-btn" data-tab="register">注册</button>
        </div>
        
        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="login-username" required>
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="login-password" required>
          </div>
          <button type="submit" class="btn-primary">登录</button>
        </form>
        
        <form id="register-form" class="auth-form hidden">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="reg-username" required>
          </div>
          <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="reg-email" required>
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="reg-password" required>
          </div>
          <button type="submit" class="btn-primary">注册</button>
        </form>
        <p id="auth-error" class="error-msg"></p>
      </div>
    </div>

    <!-- 大厅页面 -->
    <div id="lobby-page" class="page hidden">
      <header class="lobby-header">
        <h2>欢迎, <span id="username-display"></span></h2>
        <div class="user-stats">
          <span>天梯分: <strong id="rating-display">1500</strong></span>
          <span>胜率: <strong id="winrate-display">0%</strong></span>
          <span>战绩: <strong id="record-display">0胜0负0平</strong></span>
          <span>在线人数: <strong id="online-count">0</strong></span>
        </div>
        <button id="logout-btn" class="btn-secondary">退出登录</button>
      </header>
      
      <div class="lobby-content">
        <div class="match-section">
          <button id="match-btn" class="btn-match">开始匹配</button>
          <p id="match-status" class="match-status hidden"></p>
          <button id="cancel-match-btn" class="btn-cancel hidden">取消匹配</button>
        </div>
        
        <div class="history-section">
          <h3>历史战绩</h3>
          <div id="history-list" class="history-list">
            <p class="empty-hint">暂无对局记录</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 游戏页面 -->
    <div id="game-page" class="page hidden">
      <header class="game-header">
        <div class="player-info" id="player-a-info">
          <span class="player-name" id="player-a-name">等待中...</span>
          <span class="player-rating" id="player-a-rating"></span>
        </div>
        <div class="game-info">
          <span id="game-status">等待对手...</span>
          <span id="game-timer">00:00</span>
        </div>
        <div class="player-info" id="player-b-info">
          <span class="player-name" id="player-b-name"></span>
          <span class="player-rating" id="player-b-rating"></span>
        </div>
      </header>
      
      <div class="game-content">
        <div class="board-container">
          <canvas id="game-board" width="450" height="450"></canvas>
        </div>
        <div class="game-sidebar">
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input">
            <input type="text" id="chat-input" placeholder="发送消息...">
            <button id="chat-send">发送</button>
          </div>
          <button id="leave-room-btn" class="btn-leave">认输离开</button>
        </div>
      </div>
    </div>
    
    <!-- 游戏结果弹窗 -->
    <div id="result-modal" class="modal hidden">
      <div class="modal-content">
        <h2 id="result-title">游戏结束</h2>
        <p id="result-message"></p>
        <button id="result-close" class="btn-primary">返回大厅</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/test-client.js"></script>
</body>
</html>
